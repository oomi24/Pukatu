name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint
        continue-on-error: true # Opcional, para no bloquear el deploy si solo quieres warnings

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }} # Requerido
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }} # Requerido
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }} # Requerido
          working-directory: ./
          prod: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
